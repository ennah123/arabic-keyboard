<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Virtual Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <br>
        <br>
        <header class="header">
            <h1>لوحة المفاتيح العربية</h1>
            <p class="subtitle"> AZERTY الكتابة بالعربية بسهولة عبر تخطيط </p>
        </header>

        <div class="textarea-wrapper">
            <textarea
                id="textArea"
                placeholder="اكتب هنا..."
                dir="rtl"
            ></textarea>
        </div>

        <div class="actions">
            <button id="clearBtn" title="Clear text">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                </svg>
                <span>Clear</span>
            </button>
            <button id="copyBtn" title="Copy to clipboard">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Copy</span>
            </button>
        </div>

        <div class="keyboard" id="keyboard"></div>
        <footer class="footer">
            <p>© <span id="year"></span> <a href="https://ennah-ouldlakhlifa.com" target="_blank">Ennah Ouldlakhlifa</a>. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
    
</body>
</html>
